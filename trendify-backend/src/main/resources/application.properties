# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ─── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/trendify_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Rushikesh@18
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── JWT ─────────────────────────────────────────────────────────────────────
app.jwt.secret=TrendiFySecretKey2024_ThisMustBeAtLeast256BitsLong_ChangeInProduction!
app.jwt.expiration=86400000

# ─── File Upload ─────────────────────────────────────────────────────────────
app.file.upload-dir=./uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── CORS ────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.trendify=DEBUG
logging.level.org.springframework.security=INFO


spring.jackson.serialization.fail-on-empty-beans=false
